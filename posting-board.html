---
layout: default
title: "收片张贴版"
---
<div class="text-center">
  <header class="post-header">
    <h1 class="post-title text-center mb-4" data-localize="Gallery of Received Postcards">{{ page.title }}</h1>
  </header>
  <div class="mb-3 d-flex align-items-center justify-content-center" style="gap: 8px;">
    <span data-localize="posting-board.filter">筛选：</span>
    <select id="yearFilter" class="form-control d-inline-block" style="width: auto;">
      <option value="" data-localize="posting-board.latest">最近 48 张</option>
    </select>
    <select id="monthFilter" class="form-control d-inline-block" style="width: auto;" disabled>
      <option value="" data-localize="posting-board.all-months">全年</option>
    </select>
  </div>
  <div id="boardSpinner" class="py-5" style="display:none;">
    <div class="spinner-border" role="status" style="width:3rem;height:3rem;color:#8B7B5A;">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  <canvas id="canvas" width="1024" height="808"></canvas>
</div>
<script src="{{ site.baseurl }}{{ "/js/posting-board.js"}}"></script>
